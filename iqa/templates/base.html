<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQA Test - {% block title %}{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont,
                "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .messages {
            list-style: none;
            padding: 0;
            margin: 0 0 20px;
        }
        .messages li {
            padding: 10px 16px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .messages li.success { background: #d4edda; color: #155724; }
        .messages li.error   { background: #f8d7da; color: #721c24; }
        .messages li.info    { background: #d1ecf1; color: #0c5460; }
        .messages li.warning { background: #fff3cd; color: #856404; }
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 16px 0;
        }
        th, td {
            padding: 8px 12px;
            text-align: left;
            border: 1px solid #ddd;
        }
        th { background: #f4f4f4; }
        button, .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: #447e9b;
            color: #fff;
        }
        .btn-primary:hover { background: #366a84; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="container">
        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>
                {{ message }}
            </li>
            {% endfor %}
        </ul>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    <script>
    window.addEventListener('pageshow', function(e) {
        if (e.persisted
            || (performance.getEntriesByType('navigation')[0]
                || {}).type === 'back_forward') {
            location.reload();
        }
    });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
