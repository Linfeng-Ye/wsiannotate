{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div style="max-width:400px;margin:80px auto;">
    <h1 style="text-align:center;margin-bottom:24px;">IQA Subjective Test</h1>
    {% if form.errors %}
    <div style="background:#f8d7da;color:#721c24;padding:10px 16px;border-radius:6px;margin-bottom:16px;">
        Invalid username or password.
    </div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom:14px;">
            <label for="id_username" style="display:block;margin-bottom:4px;font-weight:600;">Username</label>
            <input type="text" name="username" id="id_username" autofocus
                   style="width:100%;padding:8px 12px;border:1px solid #ccc;border-radius:6px;font-size:14px;">
        </div>
        <div style="margin-bottom:20px;">
            <label for="id_password" style="display:block;margin-bottom:4px;font-weight:600;">Password</label>
            <input type="password" name="password" id="id_password"
                   style="width:100%;padding:8px 12px;border:1px solid #ccc;border-radius:6px;font-size:14px;">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:10px;">
            Log In
        </button>
    </form>
</div>
{% endblock %}
